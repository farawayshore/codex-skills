interface:
  display_name: "Course Lab Finalize QC"
  short_description: "Compile, quality-check, and hand off final lab reports"
  default_prompt: "Use $course-lab-finalize-qc only after course-lab-final-staging and course-lab-figure-evidence have already finished the draft. Use the local copied tools in this folder to refresh build.sh, compile the report, run local QC, enforce the 20 MB PDF-size gate, record the compiled PDF page count, warn when the report falls outside the preferred 20-30 page band, and hand oversized PDFs off to compress-png. If discovery already emitted selected_reference_reports, accept --discovery-json, run the same-experiment reference comparison only after the earlier compile/QC/layout gates pass, keep this skill as a detector and reroute surface, and do not rediscover references, decode references, or write or rewrite report content."
