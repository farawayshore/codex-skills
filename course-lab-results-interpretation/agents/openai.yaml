interface:
  display_name: "Course Lab Results Interpretation"
  short_description: "Build artifact-only interpretation outputs from processed lab evidence"
  default_prompt: "Use $course-lab-results-interpretation only after normalized handout artifacts and processed-data artifacts already exist, follow a handout-first interpretation flow, rely on the local copied scripts in this folder, compare measured data against handout expectations first, compare data against simulation outputs when the handout indicates simulation matters, compare data or simulation against theory or references when those values are actually present, emit explicit comparison_records plus artifact-only JSON and Markdown handoffs, keep missing simulation or theory support visible in unresolved outputs, and do not mutate the report, generate discussion ideas, run modeling, or perform final QC."
