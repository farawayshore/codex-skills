interface:
  display_name: "Course Lab Discovery"
  short_description: "Find the right lab-report source set"
  default_prompt: "Use $course-lab-discovery to identify the best-matching experiment resources, complete multi-file data bundles, result folders, and template choices before any lab-report drafting or workspace edits. Surface multiple strong same-experiment reference reports through selected_reference_reports, emit reference_selection_status for selected versus ambiguous versus none_found, and preserve each selected reference as a dict with pdf_path, expected_decoded_markdown_path, and expected_decoded_json_path. Manual promotion must not collapse selected_reference_reports to plain strings, and this skill does not decode the reference PDFs here. If you save discovery manifests, name them after the experiment instead of using one shared filename."
